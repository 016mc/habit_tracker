name: habit_tracker
description: 跨平台习惯养成打卡应用
publish_to: 'none' # 私有项目，不发布到 pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 本地数据库
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 轻量级键值对存储
  shared_preferences: ^2.2.0

  # 滑动操作组件
  flutter_slidable: ^3.0.0

  # 图表组件
  fl_chart: ^0.66.0

  # 日历组件
  table_calendar: ^3.0.0

  # 庆祝动画效果
  confetti: ^0.7.0

  # 加载骨架屏
  shimmer: ^3.0.0

  # 不可变数据类（注解）
  freezed_annotation: ^2.4.0

  # JSON序列化（注解）
  json_annotation: ^4.8.0

  # 国际化与日期格式化
  intl: ^0.19.0

  # 唯一标识符生成
  uuid: ^4.2.1

  # Google字体
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成工具
  build_runner: ^2.4.0

  # 不可变数据类（代码生成器）
  freezed: ^2.4.0

  # JSON序列化（代码生成器）
  json_serializable: ^6.7.0

  # Riverpod代码生成器
  riverpod_generator: ^2.3.0

  # Flutter官方Lint规则
  flutter_lints: ^3.0.0

  # Hive类型适配器生成器
  hive_generator: ^2.0.1

flutter:
  # 资源配置
  uses-material-design: true
